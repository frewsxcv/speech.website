<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TTS Spike — Kokoro</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, sans-serif;
    max-width: 640px;
    margin: 3rem auto;
    padding: 0 1rem;
    line-height: 1.5;
  }
  h1 { font-size: 1.4rem; }
  textarea {
    width: 100%;
    min-height: 8rem;
    font: inherit;
    padding: 0.6rem;
    box-sizing: border-box;
    border-radius: 8px;
  }
  .row { display: flex; gap: 0.75rem; align-items: center; margin: 0.75rem 0; flex-wrap: wrap; }
  select, input[type="range"] { font: inherit; }
  button {
    font: inherit;
    padding: 0.5rem 1.25rem;
    border-radius: 8px;
    border: none;
    background: #4f46e5;
    color: white;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: wait; }
  audio { width: 100%; margin-top: 1rem; }
  #status { color: gray; font-size: 0.9rem; min-height: 1.2em; }
</style>
</head>
<body>
  <h1>🗣️ Text-to-Speech Spike</h1>
  <p>Type some text and generate speech with <a href="https://huggingface.co/hexgrad/Kokoro-82M">Kokoro-82M</a>, running locally.</p>

  <textarea id="text" placeholder="Type something to say…">Hello! This is a proof of concept using an open source text to speech model, running entirely on this machine.</textarea>

  <div class="row">
    <label>Voice <select id="voice"></select></label>
    <label>Speed <input type="range" id="speed" min="0.5" max="1.5" step="0.1" value="1">
      <span id="speedVal">1.0×</span></label>
  </div>

  <div class="row">
    <button id="go">Generate speech</button>
    <span id="status"></span>
  </div>

  <audio id="player" controls hidden></audio>

<script>
const $ = (id) => document.getElementById(id);

async function loadVoices() {
  const voices = await (await fetch("/api/voices")).json();
  for (const [id, label] of Object.entries(voices)) {
    $("voice").add(new Option(label, id));
  }
}
loadVoices();

$("speed").oninput = () => $("speedVal").textContent = Number($("speed").value).toFixed(1) + "×";

$("go").onclick = async () => {
  const text = $("text").value.trim();
  if (!text) return;
  $("go").disabled = true;
  $("status").textContent = "Generating…";
  const t0 = performance.now();
  try {
    const res = await fetch("/api/tts", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, voice: $("voice").value, speed: Number($("speed").value) }),
    });
    if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
    const blob = await res.blob();
    const player = $("player");
    player.src = URL.createObjectURL(blob);
    player.hidden = false;
    player.play();
    $("status").textContent = `Done in ${((performance.now() - t0) / 1000).toFixed(1)}s`;
  } catch (err) {
    $("status").textContent = "Error: " + err.message;
  } finally {
    $("go").disabled = false;
  }
};
</script>
</body>
</html>
