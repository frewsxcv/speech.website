<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>speech.website</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, sans-serif;
    max-width: 640px;
    margin: 3rem auto;
    padding: 0 1rem;
    line-height: 1.5;
  }
  h1 { font-size: 1.4rem; }
  textarea {
    width: 100%;
    min-height: 8rem;
    font: inherit;
    padding: 0.6rem;
    box-sizing: border-box;
    border-radius: 8px;
  }
  .row { display: flex; gap: 0.75rem; align-items: center; margin: 0.75rem 0; flex-wrap: wrap; }
  select { font: inherit; }
  button {
    font: inherit;
    padding: 0.5rem 1.25rem;
    border-radius: 8px;
    border: none;
    background: #4f46e5;
    color: white;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: wait; }
  audio { width: 100%; margin-top: 1rem; }
  #status { color: gray; font-size: 0.9rem; min-height: 1.2em; }
  progress { width: 100%; }
</style>
</head>
<body>
  <h1>🗣️ speech.website</h1>
  <p>No server: open TTS models run in this tab via ONNX Runtime Web
     (WebGPU if available, otherwise WASM). Weights download once, then cache.</p>

  <div class="row">
    <label>Model <select id="model"></select></label>
    <button id="load">Load model</button>
    <span id="device"></span>
  </div>
  <progress id="dl" max="1" value="0" hidden></progress>

  <textarea id="text" disabled>Hello! This is a proof of concept running an open source text to speech model entirely inside the browser.</textarea>

  <div class="row">
    <label>Voice <select id="voice" disabled></select></label>
    <button id="go" disabled>Generate speech</button>
    <span id="status"></span>
  </div>

  <audio id="player" controls hidden></audio>

<!-- kitten-tts-js is loaded as plain source (not a CDN bundle): bundlers' Node
     polyfills define process.versions.node, which tricks its environment
     detection into the fs-based code path. The import map supplies its bare
     dependency specifiers instead. -->
<script type="importmap">
{
  "imports": {
    "onnxruntime-web": "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.mjs",
    "phonemizer": "https://cdn.jsdelivr.net/npm/phonemizer@1.2.1/+esm",
    "jszip": "https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm"
  }
}
</script>
<script type="module">
import { KokoroTTS } from "https://cdn.jsdelivr.net/npm/kokoro-js@1.2.1/+esm";
import { KittenTTS } from "https://cdn.jsdelivr.net/npm/kitten-tts-js@0.1.2/src/index.browser.js";
import * as ort from "onnxruntime-web";

// ORT resolves its .wasm/.mjs helpers relative to the importing module by
// default, which breaks when the importer lives on a different CDN path.
ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/";

const $ = (id) => document.getElementById(id);
const webgpu = !!navigator.gpu;
$("device").textContent = `backend: ${webgpu ? "webgpu" : "wasm"}`;

// Each loader returns { voices: [{id, label}], generate(text, voiceId) -> {samples, rate} }.
const MODELS = {
  kokoro: {
    label: `Kokoro-82M — best quality, ~${webgpu ? 326 : 92} MB`,
    async load(onProgress) {
      const tts = await KokoroTTS.from_pretrained("onnx-community/Kokoro-82M-v1.0-ONNX", {
        dtype: webgpu ? "fp32" : "q8",
        device: webgpu ? "webgpu" : "wasm",
        progress_callback: onProgress,
      });
      return {
        voices: Object.entries(tts.voices).map(([id, v]) =>
          ({ id, label: `${v.name} (${v.language} ${v.gender})` })),
        async generate(text, voice) {
          const audio = await tts.generate(text, { voice });
          return { samples: audio.audio, rate: audio.sampling_rate };
        },
      };
    },
  },
  kitten: {
    label: "KittenTTS nano — smallest, ~24 MB",
    async load() {
      const tts = await KittenTTS.from_pretrained("KittenML/kitten-tts-nano-0.8");
      return {
        voices: tts.list_voices().map((name) => ({ id: name, label: name })),
        async generate(text, voice) {
          const audio = await tts.generate(text, { voice });
          return { samples: audio.data, rate: audio.sampling_rate };
        },
      };
    },
  },
  piper: {
    label: "Piper — huge voice catalog, ~65 MB per voice",
    async load() {
      const piper = await import("https://cdn.jsdelivr.net/npm/@mintplex-labs/piper-tts-web@1.0.4/+esm");
      const curated = [
        "en_US-hfc_female-medium", "en_US-lessac-medium", "en_US-amy-medium",
        "en_US-ryan-high", "en_GB-alan-medium", "en_GB-alba-medium",
        "de_DE-thorsten-medium", "fr_FR-siwis-medium", "es_ES-sharvard-medium",
        "it_IT-paola-medium", "pt_BR-faber-medium", "ru_RU-irina-medium",
        "uk_UA-ukrainian_tts-medium", "zh_CN-huayan-medium",
      ];
      const available = new Set((await piper.voices()).map((v) => v.key ?? v.id ?? v));
      return {
        voices: curated.filter((id) => available.has(id)).map((id) => ({ id, label: id })),
        async generate(text, voice) {
          // Each voice downloads on first use, then persists in origin-private FS.
          const blob = await piper.predict({ text, voiceId: voice });
          return { blob };
        },
      };
    },
  },
  mms: {
    label: "MMS (Meta) — 12 languages, ~36 MB each",
    async load(onProgress) {
      const { pipeline } = await import("https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.1/dist/transformers.min.js");
      const langs = {
        eng: "English", spa: "Spanish", fra: "French", deu: "German",
        por: "Portuguese", rus: "Russian", kor: "Korean", hin: "Hindi",
        ara: "Arabic", vie: "Vietnamese", ron: "Romanian", yor: "Yoruba",
      };
      const cache = {};
      const get = async (lang) =>
        cache[lang] ??= await pipeline("text-to-speech", `Xenova/mms-tts-${lang}`,
          { dtype: "q8", device: "wasm", progress_callback: onProgress });
      await get("eng");
      return {
        voices: Object.entries(langs).map(([id, label]) => ({ id, label })),
        async generate(text, lang) {
          const out = await (await get(lang))(text);
          return { samples: out.audio, rate: out.sampling_rate };
        },
      };
    },
  },
  oute: {
    label: "OuteTTS-0.2-500M — LLM voices, ~300 MB" + (webgpu ? "" : " (slow without WebGPU)"),
    async load() {
      const { HFModelConfig_v1, InterfaceHF } =
        await import("https://cdn.jsdelivr.net/npm/outetts@0.2.0/+esm");
      const cfg = new HFModelConfig_v1({
        model_path: "onnx-community/OuteTTS-0.2-500M",
        language: "en",
        // q4f16 breaks: outetts pins transformers.js 3.1.2, which predates
        // Chrome's native Float16Array and mishandles fp16 tensors there.
        dtype: "q4",
        device: webgpu ? "webgpu" : "wasm",
      });
      const iface = await InterfaceHF({ model_version: "0.2", cfg });
      const speakers = ["random", "en_male_1", "en_male_2", "en_male_3", "en_male_4",
                        "en_female_1", "en_female_2"];
      return {
        voices: speakers.map((s) => ({ id: s, label: s.replaceAll("_", " ") })),
        async generate(text, voice) {
          let speaker = null;
          if (voice !== "random") {
            try { speaker = iface.load_default_speaker(voice); }
            catch { speaker = iface.load_default_speaker(voice.replace(/^en_/, "")); }
          }
          const out = await iface.generate({
            text, speaker, temperature: 0.1, repetition_penalty: 1.1, max_length: 4096,
          });
          return { blob: new Blob([out.to_wav("output.wav")], { type: "audio/wav" }) };
        },
      };
    },
  },
};

const engines = {};

for (const [id, m] of Object.entries(MODELS)) $("model").add(new Option(m.label, id));

function showEngine(engine) {
  const sel = $("voice");
  sel.length = 0;
  for (const v of engine.voices) sel.add(new Option(v.label, v.id));
  $("load").textContent = "Model loaded ✓";
  $("load").disabled = true;
  for (const el of ["text", "voice", "go"]) $(el).disabled = false;
}

$("model").onchange = () => {
  const engine = engines[$("model").value];
  if (engine) {
    showEngine(engine);
  } else {
    $("load").textContent = "Load model";
    $("load").disabled = false;
    $("voice").length = 0;
    for (const el of ["voice", "go"]) $(el).disabled = true;
  }
};

$("load").onclick = async () => {
  const id = $("model").value;
  $("load").disabled = true;
  $("model").disabled = true;
  $("dl").hidden = false;
  $("dl").removeAttribute("value"); // indeterminate until progress arrives
  try {
    engines[id] = await MODELS[id].load((p) => {
      if (p.status === "progress" && p.total) $("dl").value = p.loaded / p.total;
    });
    showEngine(engines[id]);
  } catch (err) {
    $("status").textContent = "Error loading model: " + err.message;
    $("load").disabled = false;
  } finally {
    $("dl").hidden = true;
    $("model").disabled = false;
  }
};

function toWavBlob(samples, rate) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(buf);
  const str = (o, s) => [...s].forEach((c, i) => v.setUint8(o + i, c.charCodeAt(0)));
  str(0, "RIFF"); v.setUint32(4, 36 + samples.length * 2, true); str(8, "WAVEfmt ");
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, rate, true); v.setUint32(28, rate * 2, true);
  v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  str(36, "data"); v.setUint32(40, samples.length * 2, true);
  samples.forEach((s, i) => v.setInt16(44 + i * 2, Math.max(-1, Math.min(1, s)) * 0x7fff, true));
  return new Blob([buf], { type: "audio/wav" });
}

$("go").onclick = async () => {
  const engine = engines[$("model").value];
  const text = $("text").value.trim();
  if (!engine || !text) return;
  $("go").disabled = true;
  $("status").textContent = "Generating…";
  const t0 = performance.now();
  try {
    const out = await engine.generate(text, $("voice").value);
    const player = $("player");
    player.src = URL.createObjectURL(out.blob ?? toWavBlob(out.samples, out.rate));
    player.hidden = false;
    player.play();
    $("status").textContent = `Done in ${((performance.now() - t0) / 1000).toFixed(1)}s`;
  } catch (err) {
    $("status").textContent = "Error: " + err.message;
  } finally {
    $("go").disabled = false;
  }
};
</script>
</body>
</html>
